rules:
  apache-pulsar-info-title-required:
    description: Info object must have a title
    message: API must have a title in the info object
    severity: error
    given: $.info
    then:
      field: title
      function: truthy
  apache-pulsar-operation-summary-required:
    description: All operations must have a summary
    message: Operation must have a summary
    severity: error
    given: $.paths[*][*]
    then:
      field: summary
      function: truthy
  apache-pulsar-operation-operationId-required:
    description: All operations must have an operationId
    message: Operation must have an operationId
    severity: error
    given: $.paths[*][*]
    then:
      field: operationId
      function: truthy
  apache-pulsar-operation-tags-required:
    description: All operations must have tags
    message: Operation must have at least one tag
    severity: warn
    given: $.paths[*][*]
    then:
      field: tags
      function: truthy
  apache-pulsar-operation-summary-apache-prefix:
    description: Operation summaries should be prefixed with Apache Pulsar
    message: Summary should start with "Apache Pulsar"
    severity: warn
    given: $.paths[*][*].summary
    then:
      function: pattern
      functionOptions:
        match: "^Apache Pulsar"
  apache-pulsar-paths-kebab-case:
    description: Path segments should use kebab-case
    message: Path segments must be kebab-case
    severity: warn
    given: $.paths
    then:
      function: pattern
      functionOptions:
        match: "^(\/([a-z0-9-]+|\{[a-zA-Z0-9]+\}))*$"
  apache-pulsar-response-success-required:
    description: All operations must have a success response
    message: Operation must define a 2xx response
    severity: error
    given: $.paths[*][*].responses
    then:
      function: schema
      functionOptions:
        schema:
          anyOf:
            - required: ["200"]
            - required: ["201"]
            - required: ["204"]

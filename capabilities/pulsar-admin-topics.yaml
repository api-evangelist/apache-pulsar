          in: path
          type: string
          required: true
        - name: namespace
          in: path
          type: string
          required: true
        - name: topic
          in: path
          type: string
          required: true
        - name: force
          in: query
          type: boolean
    - name: persistent-tenant-namespace-topic-partitions
      path: /persistent/{tenant}/{namespace}/{topic}/partitions
      operations:
      - name: getpartitionedtopicmetadata
        method: GET
        description: Get partitioned topic metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant
          in: path
          type: string
          required: true
        - name: namespace
          in: path
          type: string
          required: true
        - name: topic
          in: path
          type: string
          required: true
      - name: createpartitionedtopic
        method: PUT
        description: Create partitioned topic
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant
          in: path
          type: string
          required: true
        - name: namespace
          in: path
          type: string
          required: true
        - name: topic
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object

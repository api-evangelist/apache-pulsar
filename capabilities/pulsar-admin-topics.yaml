    description: Apache Pulsar Admin REST API — Topics business capability. Self-contained, no shared references.
    resources:
    - name: persistent-tenant-namespace
      path: /persistent/{tenant}/{namespace}
      operations:
      - name: listpersistenttopics
        method: GET
        description: List persistent topics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant
          in: path
          type: string
          required: true
        - name: namespace
          in: path
          type: string
          required: true
    - name: persistent-tenant-namespace-topic
      path: /persistent/{tenant}/{namespace}/{topic}
      operations:
      - name: createnonpartitionedtopic
        method: PUT
        description: Create non-partitioned topic
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant
          in: path
          type: string
          required: true
        - name: namespace
          in: path
          type: string
          required: true
        - name: topic
          in: path
          type: string
          required: true
      - name: deletetopic
        method: DELETE
        description: Delete topic
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.

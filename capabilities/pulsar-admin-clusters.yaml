naftiko: 1.0.0-alpha2
info:
  label: Apache Pulsar Admin REST API — Clusters
  description: 'Apache Pulsar Admin REST API — Clusters. 4 operations. Lead operation: List clusters. Self-contained Naftiko
    capability covering one Apache Pulsar business surface.'
  tags:
  - Apache Pulsar
  - Clusters
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APACHE_PULSAR_API_KEY: APACHE_PULSAR_API_KEY
capability:
  consumes:
  - type: http
    namespace: pulsar-admin-clusters
    baseUri: http://localhost:8080/admin/v2
    description: Apache Pulsar Admin REST API — Clusters business capability. Self-contained, no shared references.
    resources:
    - name: clusters
      path: /clusters
      operations:
      - name: getclusters
        method: GET
        description: List clusters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: clusters-cluster
      path: /clusters/{cluster}
      operations:
      - name: getcluster
        method: GET
        description: Get cluster configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cluster
          in: path
          type: string
          required: true
      - name: updatecluster
        method: PUT
        description: Update cluster configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cluster
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletecluster
        method: DELETE
        description: Delete cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cluster
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: pulsar-admin-clusters-rest
    port: 8080
    description: REST adapter for Apache Pulsar Admin REST API — Clusters. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/clusters
      name: clusters
      description: REST surface for clusters.
      operations:
      - method: GET
        name: getclusters
        description: List clusters
        call: pulsar-admin-clusters.getclusters
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/clusters/{cluster}
      name: clusters-cluster
      description: REST surface for clusters-cluster.
      operations:
      - method: GET
        name: getcluster
        description: Get cluster configuration
        call: pulsar-admin-clusters.getcluster
        with:
          cluster: rest.cluster
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatecluster
        description: Update cluster configuration
        call: pulsar-admin-clusters.updatecluster
        with:
          cluster: rest.cluster
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecluster
        description: Delete cluster
        call: pulsar-admin-clusters.deletecluster
        with:
          cluster: rest.cluster
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pulsar-admin-clusters-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apache Pulsar Admin REST API — Clusters. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-clusters
      description: List clusters
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pulsar-admin-clusters.getclusters
      outputParameters:
      - type: object
        mapping: $.
    - name: get-cluster-configuration
      description: Get cluster configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pulsar-admin-clusters.getcluster
      with:
        cluster: tools.cluster
      outputParameters:
      - type: object
        mapping: $.
    - name: update-cluster-configuration
      description: Update cluster configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: pulsar-admin-clusters.updatecluster
      with:
        cluster: tools.cluster
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-cluster
      description: Delete cluster
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: pulsar-admin-clusters.deletecluster
      with:
        cluster: tools.cluster
      outputParameters:
      - type: object
        mapping: $.

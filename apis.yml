aid: apache-pulsar
name: Apache Pulsar
description: >-
  Apache Pulsar is a cloud-native, distributed messaging and streaming platform that provides server-to-server messaging with multi-tenancy, high performance, and geo-replication. It combines messaging
  and stream processing in a single platform.
type: Index
position: Consumer

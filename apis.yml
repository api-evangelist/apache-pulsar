apis:
  - aid: apache-pulsar:apache-pulsar-admin-rest-api
    name: Apache Pulsar Admin REST API
    description: >-
      The Pulsar Admin API provides REST endpoints for managing tenants, namespaces,
      topics, subscriptions, functions, connectors, and cluster configuration.
    humanURL: https://pulsar.apache.org/admin-rest-api/
    baseURL: http://localhost:8080/admin/v2
    tags:
      - Administration
      - Multi-Tenant
      - REST
    properties:
      - type: Documentation
        url: https://pulsar.apache.org/admin-rest-api/
      - type: OpenAPI
        url: openapi/pulsar-admin.yml
  - aid: apache-pulsar:apache-pulsar-messaging-api
    name: Apache Pulsar Messaging API
    description: >-
      Pulsar messaging protocol for producing and consuming messages on topics,
      with support for multiple subscription types (Exclusive, Shared, Failover,
      Key_Shared), schema enforcement, and both persistent and non-persistent topics.
    humanURL: https://pulsar.apache.org/docs/next/client-libraries/
    tags:
      - Messaging
      - Pub-Sub
      - Streaming
    properties:
      - type: Documentation
        url: https://pulsar.apache.org/docs/next/client-libraries/
      - type: AsyncAPI
        url: asyncapi/pulsar-messaging.yml
      - type: JSONSchema
        url: json-schema/pulsar-message.json

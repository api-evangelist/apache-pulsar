- aid: apache-pulsar:apache-pulsar-messaging-api
  name: Apache Pulsar Messaging API
  description: >-
    Pulsar messaging protocol for producing and consuming messages on topics,
    with support for multiple subscription types (Exclusive, Shared, Failover,
    Key_Shared), schema enforcement, and both persistent and non-persistent topics.
  humanURL: https://pulsar.apache.org/docs/next/client-libraries/
  tags:
  - Messaging
  - Pub-Sub
  - Streaming
  properties:
  - type: Documentation
    url: https://pulsar.apache.org/docs/next/client-libraries/
  - type: AsyncAPI
